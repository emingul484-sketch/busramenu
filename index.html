<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bİ MOLA | Dijital Menü</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #d35400; 
            --secondary: #2c3e50; 
            --bg: #fdf2e9; 
            --card-bg: rgba(255, 255, 255, 0.95);
            --badge-hot: #e74c3c; --badge-chef: #f1c40f; --badge-new: #9b59b6; --badge-veg: #27ae60;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Montserrat', sans-serif; /* Ana yazı tipi Montserrat yapıldı */
            background-color: var(--bg);
            margin: 0; padding: 0;
            padding-bottom: 140px;
        }

        /* --- HEADER --- */
        .top-header { text-align: center; padding: 35px 20px 10px; }
        
        /* Marka ismi tasarımı düzeltildi */
        .brand-name { 
            font-family: 'Dancing Script', cursive; 
            font-size: 3rem; 
            font-weight: 700; 
            color: var(--primary); 
            display: block; 
            text-transform: none; 
            line-height: 1.1;
        }
        
        .sub-title { 
            font-size: 0.85rem; 
            color: var(--secondary); 
            font-weight: 700; 
            letter-spacing: 1px;
            display: block;
            margin-top: 5px;
        }

        .logo-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .main-logo { width: 140px; height: 140px; border-radius: 50%; border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); background: #fff; object-fit: contain; }

        /* --- ARAMA --- */
        .search-box { margin: 0 20px 20px; position: relative; }
        .search-input { 
            width: 100%; padding: 12px 15px 12px 45px; border-radius: 25px; border: 2px solid #fff; 
            outline: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-family: 'Montserrat', sans-serif;
        }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #999; }

        /* --- GRID KATEGORİLER --- */
        .section-title { text-align: center; font-size: 1.1rem; color: var(--secondary); margin-bottom: 15px; font-weight: 800; letter-spacing: 0.5px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; max-width: 800px; margin: 0 auto; }
        
        .cat-card { 
            background: var(--card-bg); border-radius: 15px; padding: 15px 10px; 
            text-align: center; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 145px;
            border: 2px solid transparent; transition: all 0.2s;
        }
        .cat-card:active { transform: scale(0.98); border-color: var(--primary); }
        .cat-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 3px solid #fff; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .cat-card span { font-size: 0.75rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; }

        /* --- DETAY EKRANI --- */
        #detail-screen { display: none; background: #f9f9f9; min-height: 100vh; padding-bottom: 140px; position: absolute; top: 0; left: 0; width: 100%; z-index: 500; }
        .detail-header { position: sticky; top: 0; background: #fff; padding: 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 600; }
        .back-btn { font-size: 1.5rem; border: none; background: none; margin-right: 15px; color: var(--secondary); cursor: pointer; }
        #cat-title { font-size: 1.1rem; font-weight: 800; color: var(--secondary); }

        .item-list { padding: 20px; }
        .item { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.03); position: relative; overflow: hidden; }
        .item img { width: 90px; height: 90px; border-radius: 10px; object-fit: cover; margin-right: 15px; }
        .item-info { flex: 1; }
        .item h3 { margin: 0 0 5px; font-size: 0.95rem; color: var(--secondary); font-weight: 700; }
        .item p { margin: 0 0 10px; font-size: 0.75rem; color: #666; font-style: italic; line-height: 1.2; }
        .item-footer { display: flex; justify-content: space-between; align-items: center; }
        .price { font-weight: 800; color: var(--primary); font-size: 1.1rem; }
        .add-btn { 
            background: var(--primary); color: #fff; width: 35px; height: 35px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer;
            box-shadow: 0 4px 10px rgba(211, 84, 0, 0.3); transition: transform 0.1s;
        }

        /* Rozetler */
        .badge { position: absolute; top: 0; left: 0; padding: 3px 8px; font-size: 0.6rem; font-weight: 700; color: #fff; border-bottom-right-radius: 8px; }
        .b-hot { background: var(--badge-hot); } .b-chef { background: var(--badge-chef); color: #333; } .b-new { background: var(--badge-new); } .b-veg { background: var(--badge-veg); }

        /* --- SEPET BARI --- */
        #cart-bar {
            position: fixed; bottom: 75px; left: 20px; right: 20px;
            background: var(--secondary); color: white;
            padding: 15px; border-radius: 15px;
            display: none; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 900;
        }
        .cart-total { font-size: 1.2rem; font-weight: 800; }
        .reset-btn { background: #e74c3c; color: white; border:none; padding: 8px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; cursor: pointer; }

        /* --- NAV --- */
        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: #999; font-size: 0.7rem; text-decoration: none; font-weight: 600; }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

            </div>
             <div class="cat-card" onclick="openCat('klasik_tost')">

    <script>
        // SEPET MANTIĞI
        let totalAmount = 0;
        let totalCount = 0;

        function addToCart(name, priceStr) {
            if(!priceStr) return; // Fiyatı olmayan ürünü sepete ekleme
            
            let price = parseFloat(priceStr.replace('₺', '').trim());
            totalAmount += price;
            totalCount++;
            
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const cartBar = document.getElementById('cart-bar');
            const cartCountEl = document.getElementById('cart-count');
            const cartTotalEl = document.getElementById('cart-total');

            if(totalCount > 0) {
                cartBar.style.display = 'flex';
                cartCountEl.innerText = `${totalCount} Ürün Seçildi`;
                cartTotalEl.innerText = `${totalAmount.toFixed(1)}₺`;
            } else {
                cartBar.style.display = 'none';
            }
        }

        function resetCart() {
            totalAmount = 0;
            totalCount = 0;
            updateCartDisplay();
        }

        function openCat(cat) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('detail-screen').style.display = 'block';
            document.getElementById('cat-title').innerText = cat.toUpperCase().replace('_',' ');
            
            const list = document.getElementById('item-list');
            list.innerHTML = '';
            
            const items = data[cat];
            if(items){
                items.forEach(item => {
                    let badgeHTML = '';
                    if(item.b) {
                        let bText = item.b === 'hot' ? '🔥 Çok Tercih Edilen' : item.b === 'chef' ? '⭐ Şefin Seçimi' : item.b === 'new' ? '✨ Yeni' : '';
                        let bClass = 'b-' + item.b;
                        badgeHTML = `<div class="badge ${bClass}">${bText}</div>`;
                    }

                    // Fiyat Kontrolü
                    let priceHTML = item.p ? `<div class="price">${item.p}</div>` : '';
                    let addBtnHTML = item.p ? `<div class="add-btn" onclick="addToCart('${item.n}', '${item.p}')">+</div>` : '';

                    // FALLBACK GÖRSEL MANTIĞI
                    let fallbackImg = 'logo.png';
                    if (cat === 'kahvalti') fallbackImg = 'kahvalti.jpg';
                    if (cat === 'sokak') fallbackImg = 'sokak.jpg';
                    if (cat === 'diger') fallbackImg = 'logo.png';
                    // Yeni eklenen kategoriler için fallback
                    if (cat === 'yeni_lezzetler') fallbackImg = 'sikma_tost.jpg';
                    if (cat === 'bazlama_tost') fallbackImg = 'bazlama_tost.jpg';

                    list.innerHTML += `
                    <div class="item">
                        ${badgeHTML}
                        <img src="${item.i}" onerror="this.onerror=null; this.src='${fallbackImg}';">
                        <div class="item-info">
                            <h3>${item.n}</h3>
                            <p>${item.d}</p>
                            <div class="item-footer">
                                ${priceHTML}
                                ${addBtnHTML}
                            </div>
                        </div>
                    </div>`;
                });
            }
            window.scrollTo(0,0);
        }

        function closeCat() {
            document.getElementById('detail-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('search').value = '';
            document.getElementById('main-grid').style.display = 'grid';
            document.querySelector('.section-title').style.display = 'block';
        }

        function searchFunc() {
            const val = document.getElementById('search').value.toLowerCase();
            if(val.length > 2) {
                document.getElementById('home-screen').style.display = 'none';
                document.getElementById('detail-screen').style.display = 'block';
                document.getElementById('cat-title').innerText = "ARAMA SONUÇLARI";
                const list = document.getElementById('item-list');
                list.innerHTML = '';
                
                for(let key in data) {
                    data[key].forEach(item => {
                        if(item.n.toLowerCase().includes(val)) {
                            let priceHTML = item.p ? `<div class="price">${item.p}</div>` : '';
                            let addBtnHTML = item.p ? `<div class="add-btn" onclick="addToCart('${item.n}', '${item.p}')">+</div>` : '';
                            
                            // Aramada varsayılan görsel logo olsun
                            list.innerHTML += `
                            <div class="item">
                                <img src="${item.i}" onerror="this.src='logo.png'">
                                <div class="item-info">
                                    <h3>${item.n}</h3>
                                    <p>${item.d}</p>
                                    <div class="item-footer">
                                        ${priceHTML}
                                        ${addBtnHTML}
                                    </div>
                                </div>
                            </div>`;
                        }
                    });
                }
            } else if (val.length === 0) {
                closeCat();
            }
        }
